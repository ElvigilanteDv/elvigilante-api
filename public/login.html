<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Edward · Acceso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: #f0f2f5;
            --bg-card: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-gradient: linear-gradient(135deg, #3b82f6, #8b5cf6);
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
            --radius: 28px;
            --transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.dark-mode {
            --bg-primary: #0a0b0e;
            --bg-card: #14161c;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #475569;
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            transition: background var(--transition), color var(--transition);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        #safety-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            z-index: 9999;
            transition: opacity 0.6s ease;
        }

        #safety-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* Tema toggle */
        .theme-btn {
            position: fixed;
            top: 24px;
            right: 24px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--bg-card);
            border: 1px solid rgba(0,0,0,0.04);
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-secondary);
            z-index: 1000;
            transition: var(--transition);
            font-size: 1rem;
        }

        body.dark-mode .theme-btn {
            border: 1px solid rgba(255,255,255,0.04);
        }

        .theme-btn:hover {
            transform: rotate(20deg) scale(1.05);
            color: var(--accent);
        }

        /* Card */
        .login-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 40px 36px;
            width: 100%;
            max-width: 420px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(0,0,0,0.02);
            transition: all var(--transition);
            position: relative;
            overflow: hidden;
        }

        body.dark-mode .login-card {
            border: 1px solid rgba(255,255,255,0.02);
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--accent-gradient);
            opacity: 0.6;
        }

        .brand-icon {
            width: 56px;
            height: 56px;
            border-radius: 18px;
            background: var(--accent-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            color: white;
            margin: 0 auto 16px;
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.2);
        }

        .brand-title {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            text-align: center;
        }

        .brand-title span {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand-sub {
            text-align: center;
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* Inputs */
        .input-group {
            margin-bottom: 18px;
        }

        .input-label {
            display: block;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-field {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-primary);
            border: 1.5px solid transparent;
            border-radius: 16px;
            color: var(--text-primary);
            font-size: 0.9rem;
            font-weight: 500;
            transition: var(--transition);
            outline: none;
            font-family: inherit;
        }

        .input-field::placeholder {
            color: var(--text-muted);
            font-weight: 400;
            font-size: 0.85rem;
        }

        .input-field:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.08);
        }

        .input-icon {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.9rem;
            transition: var(--transition);
            background: none;
            border: none;
            padding: 4px;
        }

        .input-icon:hover {
            color: var(--accent);
        }

        /* Botón */
        .btn-login {
            width: 100%;
            padding: 15px;
            background: var(--accent-gradient);
            color: white;
            border: none;
            border-radius: 16px;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 16px rgba(59, 130, 246, 0.2);
            margin-top: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(59, 130, 246, 0.3);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* Footer */
        .login-footer {
            margin-top: 24px;
            text-align: center;
            padding-top: 20px;
            border-top: 1px solid rgba(0,0,0,0.04);
        }

        body.dark-mode .login-footer {
            border-top: 1px solid rgba(255,255,255,0.04);
        }

        .login-footer p {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .login-footer a {
            color: var(--accent);
            font-weight: 700;
            text-decoration: none;
            transition: var(--transition);
        }

        .login-footer a:hover {
            color: #8b5cf6;
        }

        /* Estado de carga del botón */
        .spinner-btn {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.2);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-card {
                padding: 28px 20px;
                border-radius: 24px;
            }
            .brand-icon {
                width: 48px;
                height: 48px;
                font-size: 1.3rem;
            }
            .brand-title {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>

    <div id="safety-overlay"></div>

    <button class="theme-btn" onclick="toggleTheme()" id="theme-btn" aria-label="Toggle theme">
        <i class="fas fa-moon"></i>
    </button>

    <div class="login-card">
        <div class="brand-icon">
            <i class="fas fa-crown"></i>
        </div>
        <h2 class="brand-title">Edward <span>Access</span></h2>
        <p class="brand-sub">Protocolo de autenticación</p>

        <form id="loginForm" class="mt-6" autocomplete="off">
            <div class="input-group">
                <label class="input-label" for="email">
                    <i class="fas fa-envelope" style="margin-right:6px; color:var(--text-muted);"></i> Email
                </label>
                <div class="input-wrapper">
                    <input type="email" id="email" class="input-field" placeholder="tu@email.com" required>
                </div>
            </div>

            <div class="input-group">
                <label class="input-label" for="password">
                    <i class="fas fa-lock" style="margin-right:6px; color:var(--text-muted);"></i> Contraseña
                </label>
                <div class="input-wrapper">
                    <input type="password" id="password" class="input-field" placeholder="••••••••" required>
                    <button type="button" class="input-icon" onclick="togglePassword('password', this)" aria-label="Toggle password visibility">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" id="btnSubmit" class="btn-login">
                <i class="fas fa-arrow-right-to-bracket"></i> Acceder
            </button>
        </form>

        <div class="login-footer">
            <p>¿Nuevo? <a href="/register">Crea tu cuenta</a></p>
        </div>
    </div>

    <script>
        // --- Tema ---
        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('theme-btn');
            const icon = btn.querySelector('i');

            body.classList.toggle('dark-mode');

            if (body.classList.contains('dark-mode')) {
                icon.classList.replace('fa-moon', 'fa-sun');
                localStorage.setItem('kazuma-theme', 'dark');
            } else {
                icon.classList.replace('fa-sun', 'fa-moon');
                localStorage.setItem('kazuma-theme', 'light');
            }
        }

        // --- Carga inicial ---
        (function init() {
            const savedTheme = localStorage.getItem('kazuma-theme');
            const user = localStorage.getItem('kazuma_user');

            if (savedTheme === 'dark') {
                document.body.classList.add('dark-mode');
                document.getElementById('theme-btn').querySelector('i').classList.replace('fa-moon', 'fa-sun');
            }

            // Si ya hay sesión, redirigir al dashboard
            if (user) {
                window.location.href = '/dash';
            } else {
                // Mostrar la pantalla de login después de un breve fade
                setTimeout(() => {
                    document.getElementById('safety-overlay').classList.add('hidden');
                }, 300);
            }
        })();

        // --- Mostrar/ocultar contraseña ---
        function togglePassword(id, btn) {
            const input = document.getElementById(id);
            const icon = btn.querySelector('i');

            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        // --- Envío del formulario ---
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn = document.getElementById('btnSubmit');
            const originalText = btn.innerHTML;

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-btn"></span> Autenticando...';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value.trim(),
                        password: document.getElementById('password').value
                    })
                });

                const data = await res.json();

                if (data.status) {
                    localStorage.setItem('kazuma_user', JSON.stringify(data.data));
                    // Mostrar overlay y redirigir
                    document.getElementById('safety-overlay').classList.remove('hidden');
                    window.location.href = '/dash';
                } else {
                    throw new Error(data.message || 'Credenciales incorrectas');
                }
            } catch (err) {
                Swal.fire({
                    title: 'Error',
                    text: err.message,
                    icon: 'error',
                    background: 'var(--bg-card)',
                    color: 'var(--text-primary)',
                    confirmButtonColor: '#3b82f6',
                    confirmButtonText: 'Intentar de nuevo'
                });
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        });
    </script>
</body>
</html>
