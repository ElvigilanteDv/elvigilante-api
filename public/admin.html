<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Edward · Staff Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --bg-primary: #0a0b0e;
            --bg-card: #14161c;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #475569;
            --accent: #3b82f6;
            --accent-pink: #ec4899;
            --accent-gradient: linear-gradient(135deg, #3b82f6, #8b5cf6);
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            --radius: 24px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.light-mode {
            --bg-primary: #f0f2f5;
            --bg-card: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            transition: background var(--transition), color var(--transition);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #safety-block {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            z-index: 10000;
            transition: opacity 0.5s ease;
        }

        #safety-block.hidden {
            opacity: 0;
            pointer-events: none;
        }

        header {
            background: var(--bg-card);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.04);
            position: sticky;
            top: 0;
            z-index: 50;
            box-shadow: var(--shadow);
            transition: background var(--transition), box-shadow var(--transition);
        }

        body.light-mode header {
            border-bottom: 1px solid rgba(0,0,0,0.04);
        }

        .brand {
            font-weight: 800;
            font-size: 1.1rem;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .brand span {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand i {
            color: var(--accent);
        }

        .theme-toggle {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            color: var(--text-secondary);
            border: none;
            font-size: 0.9rem;
        }

        .theme-toggle:hover {
            background: var(--accent);
            color: white;
            transform: rotate(20deg);
        }

        .card {
            background: var(--bg-card);
            border-radius: var(--radius);
            border: 1px solid rgba(0,0,0,0.02);
            box-shadow: var(--shadow);
            transition: all var(--transition);
        }

        body.light-mode .card {
            border: 1px solid rgba(0,0,0,0.02);
        }

        .stat-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 20px 24px;
            border: 1px solid rgba(0,0,0,0.02);
            box-shadow: var(--shadow);
            transition: all var(--transition);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
        }

        body.light-mode .stat-card:hover {
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
        }

        .stat-label {
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-muted);
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-top: 2px;
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            background: rgba(59, 130, 246, 0.08);
            color: var(--accent);
        }

        .stat-icon.pink {
            background: rgba(236, 72, 153, 0.08);
            color: var(--accent-pink);
        }

        .stat-icon.gold {
            background: rgba(245, 158, 11, 0.08);
            color: #f59e0b;
        }

        .stat-icon.green {
            background: rgba(34, 197, 94, 0.08);
            color: #22c55e;
        }

        .btn-filter {
            padding: 10px 16px;
            border-radius: 14px;
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: 1.5px solid transparent;
            transition: var(--transition);
            cursor: pointer;
            background: var(--bg-card);
            color: var(--text-secondary);
            box-shadow: var(--shadow);
            flex: 1;
            text-align: center;
        }

        .btn-filter:hover {
            border-color: var(--accent);
            color: var(--text-primary);
        }

        .btn-filter.active {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(59, 130, 246, 0.06);
        }

        .table-container {
            overflow-x: auto;
            border-radius: var(--radius);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: var(--bg-primary);
        }

        th {
            padding: 16px 20px;
            font-size: 0.6rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-muted);
            text-align: left;
        }

        td {
            padding: 14px 20px;
            border-bottom: 1px solid rgba(0,0,0,0.02);
            font-size: 0.85rem;
        }

        body.light-mode td {
            border-bottom: 1px solid rgba(0,0,0,0.04);
        }

        tr {
            transition: var(--transition);
        }

        tr:hover {
            background: var(--bg-primary);
        }

        .badge-role {
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 0.3px;
            display: inline-block;
        }

        .badge-admin {
            background: rgba(236, 72, 153, 0.12);
            color: var(--accent-pink);
            border: 1px solid rgba(236, 72, 153, 0.2);
        }

        .badge-premium {
            background: rgba(59, 130, 246, 0.12);
            color: var(--accent);
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .badge-user {
            background: var(--bg-primary);
            color: var(--text-muted);
            border: 1px solid transparent;
        }

        .btn-action {
            width: 36px;
            height: 36px;
            border-radius: 12px;
            border: 1px solid transparent;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
            color: var(--text-secondary);
        }

        .btn-action:hover {
            border-color: var(--accent);
            color: var(--accent);
            transform: translateY(-1px);
        }

        .btn-action.danger:hover {
            border-color: #ef4444;
            color: #ef4444;
        }

        .btn-action.locked {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .btn-action.locked:hover {
            border-color: transparent;
            color: var(--text-secondary);
            transform: none;
        }

        /* Modal personalizado */
        .swal2-popup {
            border-radius: var(--radius) !important;
            background: var(--bg-card) !important;
            border: 1px solid rgba(0,0,0,0.02) !important;
            padding: 2rem !important;
        }

        body.light-mode .swal2-popup {
            border: 1px solid rgba(0,0,0,0.02) !important;
        }

        .swal-label {
            text-align: left;
            text-transform: uppercase;
            font-weight: 700;
            font-size: 0.6rem;
            letter-spacing: 0.8px;
            color: var(--text-muted);
            display: block;
            margin-bottom: 4px;
            margin-left: 4px;
        }

        .input-dark {
            background: var(--bg-primary);
            border: 1.5px solid transparent;
            border-radius: 14px;
            padding: 10px 14px;
            color: var(--text-primary);
            font-size: 0.85rem;
            width: 100%;
            outline: none;
            transition: var(--transition);
            font-family: inherit;
        }

        .input-dark:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.08);
        }

        .input-dark::placeholder {
            color: var(--text-muted);
        }

        .input-dark.font-mono {
            font-family: 'Menlo', 'Monaco', monospace;
            color: var(--accent);
        }

        select.input-dark {
            appearance: none;
            cursor: pointer;
        }

        .search-box {
            position: relative;
        }

        .search-box i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .search-box input {
            padding-left: 40px;
        }

        @media (max-width: 640px) {
            .stat-card { padding: 16px; }
            .stat-value { font-size: 1.3rem; }
            .stat-icon { width: 40px; height: 40px; font-size: 1rem; }
            .btn-filter { font-size: 0.55rem; padding: 8px 12px; }
            th, td { padding: 10px 12px; font-size: 0.75rem; }
        }
    </style>
</head>
<body>

    <div id="safety-block"></div>

    <header>
        <div class="brand">
            <i class="fas fa-crown"></i>
            <span>Edward · Staff</span>
        </div>
        <div class="flex items-center gap-3">
            <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn" aria-label="Toggle theme">
                <i class="fas fa-moon"></i>
            </button>
            <button onclick="location.href='/dash'" class="text-xs font-bold bg-[var(--bg-primary)] px-4 py-2 rounded-xl border border-[var(--text-muted)]/10 transition hover:border-[var(--accent)]" style="color: var(--text-secondary);">
                <i class="fas fa-arrow-left mr-2"></i> Volver
            </button>
        </div>
    </header>

    <main class="container mx-auto p-4 max-w-6xl flex-grow pb-12">

        <!-- Estadísticas -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mt-6">
            <div class="stat-card">
                <div>
                    <div class="stat-label"><i class="fas fa-users" style="margin-right:4px;"></i> Total Usuarios</div>
                    <div id="total-count" class="stat-value">0</div>
                </div>
                <div class="stat-icon"><i class="fas fa-users"></i></div>
            </div>
            <div class="stat-card">
                <div>
                    <div class="stat-label"><i class="fas fa-crown" style="margin-right:4px;"></i> Premium</div>
                    <div id="premium-count" class="stat-value" style="color: var(--accent);">0</div>
                </div>
                <div class="stat-icon"><i class="fas fa-crown"></i></div>
            </div>
            <div class="stat-card">
                <div>
                    <div class="stat-label"><i class="fas fa-user-shield" style="margin-right:4px;"></i> Admins</div>
                    <div id="admin-count" class="stat-value" style="color: var(--accent-pink);">0</div>
                </div>
                <div class="stat-icon pink"><i class="fas fa-user-shield"></i></div>
            </div>
            <div class="stat-card">
                <div>
                    <div class="stat-label"><i class="fas fa-chart-line" style="margin-right:4px;"></i> Solicitudes Hoy</div>
                    <div id="requests-today" class="stat-value" style="color: #22c55e;">0</div>
                </div>
                <div class="stat-icon green"><i class="fas fa-chart-line"></i></div>
            </div>
        </div>

        <!-- Filtros y búsqueda -->
        <div class="flex flex-col sm:flex-row gap-3 mt-6">
            <div class="flex gap-2 flex-1">
                <button onclick="filterUsers('all')" id="btn-all" class="btn-filter active">Todos</button>
                <button onclick="filterUsers('premium')" id="btn-premium" class="btn-filter">Premium</button>
                <button onclick="filterUsers('admin')" id="btn-admin" class="btn-filter">Admins</button>
                <button onclick="filterUsers('user')" id="btn-user" class="btn-filter">Usuarios</button>
            </div>
            <div class="search-box" style="min-width: 200px;">
                <i class="fas fa-search"></i>
                <input type="text" id="search-input" class="input-dark" placeholder="Buscar usuario..." oninput="searchUsers()">
            </div>
        </div>

        <!-- Tabla de usuarios -->
        <div class="card mt-6 overflow-hidden">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Usuario / Email</th>
                            <th>Rango</th>
                            <th>Plan</th>
                            <th>Consumo</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="user-table-body">
                        <tr>
                            <td colspan="5" class="text-center py-12 text-[var(--text-muted)] font-medium">
                                <i class="fas fa-spinner fa-spin mr-2"></i> Cargando usuarios...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Botón para recargar -->
        <div class="mt-6 text-center">
            <button onclick="loadUsers()" class="text-xs font-bold text-[var(--text-muted)] hover:text-[var(--accent)] transition px-4 py-2 rounded-xl border border-[var(--text-muted)]/10">
                <i class="fas fa-sync-alt mr-2"></i> Recargar datos
            </button>
        </div>

    </main>

    <script>
        const userData = JSON.parse(localStorage.getItem('kazuma_user'));
        let allUsers = [];
        let filteredUsers = [];
        const SUPER_ADMIN = "frasesbebor@gmail.com";

        // Verificar acceso
        if (!userData || userData.role !== 'admin') {
            window.location.href = '/dash';
        } else {
            document.body.style.display = 'block';
            loadUsers();
        }

        // Tema
        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('theme-btn');
            const icon = btn.querySelector('i');

            body.classList.toggle('light-mode');

            if (body.classList.contains('light-mode')) {
                icon.classList.replace('fa-moon', 'fa-sun');
                localStorage.setItem('kazuma-theme', 'light');
            } else {
                icon.classList.replace('fa-sun', 'fa-moon');
                localStorage.setItem('kazuma-theme', 'dark');
            }
        }

        // Cargar tema guardado
        (function initTheme() {
            const saved = localStorage.getItem('kazuma-theme');
            if (saved === 'light') {
                document.body.classList.add('light-mode');
                document.getElementById('theme-btn').querySelector('i').classList.replace('fa-moon', 'fa-sun');
            }
        })();

        async function loadUsers() {
            try {
                const res = await fetch(`/api/auth/admin/all?apiKey=${userData.key}`);
                const data = await res.json();

                if (data.status) {
                    allUsers = data.users;
                    filteredUsers = allUsers;
                    updateStats();
                    renderTable(allUsers);
                    document.getElementById('safety-block').classList.add('hidden');
                }
            } catch (e) {
                console.error('Error al cargar usuarios:', e);
                document.getElementById('user-table-body').innerHTML = `
                    <tr>
                        <td colspan="5" class="text-center py-12 text-red-500 font-medium">
                            <i class="fas fa-exclamation-triangle mr-2"></i> Error al cargar datos
                        </td>
                    </tr>
                `;
            }
        }

        function updateStats() {
            const total = allUsers.length;
            const premium = allUsers.filter(u => u.role === 'premium').length;
            const admins = allUsers.filter(u => u.role === 'admin').length;
            const requests = allUsers.reduce((sum, u) => sum + (u.requestToday || 0), 0);

            document.getElementById('total-count').innerText = total;
            document.getElementById('premium-count').innerText = premium;
            document.getElementById('admin-count').innerText = admins;
            document.getElementById('requests-today').innerText = requests;
        }

        function renderTable(list) {
            const body = document.getElementById('user-table-body');

            if (!list || list.length === 0) {
                body.innerHTML = `
                    <tr>
                        <td colspan="5" class="text-center py-12 text-[var(--text-muted)] font-medium">
                            <i class="fas fa-inbox mr-2"></i> No hay usuarios
                        </td>
                    </tr>
                `;
                return;
            }

            body.innerHTML = list.map(u => {
                const isMe = u.email === SUPER_ADMIN;
                const isPremium = u.role === 'premium';
                const isAdmin = u.role === 'admin';

                let badgeClass = 'badge-user';
                if (isAdmin) badgeClass = 'badge-admin';
                else if (isPremium) badgeClass = 'badge-premium';

                return `
                <tr>
                    <td>
                        <div class="font-bold text-sm ${isMe ? 'text-[var(--accent-pink)]' : ''}">${u.username}</div>
                        <div class="text-[10px] text-[var(--text-muted)] font-mono">${u.email}</div>
                    </td>
                    <td>
                        <span class="badge-role ${badgeClass}">${u.role.toUpperCase()}</span>
                    </td>
                    <td>
                        <span class="text-xs font-bold text-[var(--text-secondary)]">${(u.plan || 'free').toUpperCase()}</span>
                    </td>
                    <td>
                        <div class="text-sm font-bold">${u.requestToday || 0} <span class="text-[var(--text-muted)] font-normal">/ ${u.limit || 100}</span></div>
                        <div class="w-full bg-[var(--bg-primary)] rounded-full h-1.5 mt-1" style="max-width: 120px;">
                            <div class="bg-[var(--accent)] h-1.5 rounded-full" style="width: ${Math.min((u.requestToday || 0) / (u.limit || 100) * 100, 100)}%;"></div>
                        </div>
                    </td>
                    <td class="text-center">
                        <div class="flex items-center justify-center gap-1">
                            ${isMe ? `
                                <span class="btn-action locked" title="Administrador principal">
                                    <i class="fas fa-lock text-xs"></i>
                                </span>
                            ` : `
                                <button onclick="openEdit('${u.email}')" class="btn-action" title="Editar usuario">
                                    <i class="fas fa-pen text-xs"></i>
                                </button>
                                <button onclick="deleteUser('${u.email}')" class="btn-action danger" title="Eliminar usuario">
                                    <i class="fas fa-trash text-xs"></i>
                                </button>
                                <button onclick="resetUserLimit('${u.email}')" class="btn-action" title="Resetear límite diario" style="color: #22c55e;">
                                    <i class="fas fa-rotate text-xs"></i>
                                </button>
                            `}
                        </div>
                    </td>
                </tr>
            `}).join('');
        }

        function filterUsers(type) {
            document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${type}`).classList.add('active');

            if (type === 'all') {
                filteredUsers = allUsers;
            } else {
                filteredUsers = allUsers.filter(u => u.role === type);
            }

            // Aplicar búsqueda si hay texto
            const searchText = document.getElementById('search-input').value.toLowerCase();
            if (searchText) {
                filteredUsers = filteredUsers.filter(u =>
                    u.username.toLowerCase().includes(searchText) ||
                    u.email.toLowerCase().includes(searchText)
                );
            }

            renderTable(filteredUsers);
        }

        function searchUsers() {
            const searchText = document.getElementById('search-input').value.toLowerCase();
            const activeFilter = document.querySelector('.btn-filter.active');
            const filterType = activeFilter ? activeFilter.id.replace('btn-', '') : 'all';

            let baseList = allUsers;
            if (filterType !== 'all') {
                baseList = allUsers.filter(u => u.role === filterType);
            }

            if (searchText) {
                filteredUsers = baseList.filter(u =>
                    u.username.toLowerCase().includes(searchText) ||
                    u.email.toLowerCase().includes(searchText)
                );
            } else {
                filteredUsers = baseList;
            }

            renderTable(filteredUsers);
        }

        function resetUserLimit(email) {
            Swal.fire({
                title: '¿Resetear límite?',
                text: 'Esto reiniciará el contador diario del usuario a 0',
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: 'Sí, resetear',
                cancelButtonText: 'Cancelar',
                background: 'var(--bg-card)',
                color: 'var(--text-primary)',
                confirmButtonColor: '#22c55e',
                cancelButtonColor: '#3b82f6'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    try {
                        const res = await fetch('/api/auth/admin/reset-limit', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                adminKey: userData.key,
                                targetEmail: email
                            })
                        });

                        if (res.ok) {
                            Swal.fire({
                                icon: 'success',
                                title: 'Límite reseteado',
                                text: 'El contador diario ha sido reiniciado',
                                background: 'var(--bg-card)',
                                color: 'var(--text-primary)',
                                timer: 1500,
                                showConfirmButton: false
                            });
                            loadUsers();
                        }
                    } catch (e) {
                        console.error('Error al resetear límite:', e);
                    }
                }
            });
        }

        async function openEdit(email) {
            const u = allUsers.find(user => user.email === email);
            if (!u) return;

            const { value: formValues, isDenied } = await Swal.fire({
                title: '<span style="font-weight:800; letter-spacing:-0.5px;">Editar Usuario</span>',
                background: 'var(--bg-card)',
                color: 'var(--text-primary)',
                width: '480px',
                html: `
                    <div style="text-align:left; margin-top:10px;">
                        <span class="swal-label"><i class="fas fa-user" style="margin-right:6px;"></i> Usuario</span>
                        <input id="swal-user" class="input-dark mb-3" value="${u.username}">

                        <span class="swal-label"><i class="fas fa-envelope" style="margin-right:6px;"></i> Email</span>
                        <input id="swal-email" class="input-dark mb-3" value="${u.email}">

                        <span class="swal-label"><i class="fas fa-lock" style="margin-right:6px;"></i> Contraseña</span>
                        <input id="swal-pass" class="input-dark mb-3" type="password" value="${u.password || ''}" placeholder="Nueva contraseña">

                        <span class="swal-label"><i class="fas fa-key" style="margin-right:6px;"></i> API Key</span>
                        <input id="swal-key" class="input-dark font-mono mb-3" value="${u.key}">

                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <span class="swal-label"><i class="fas fa-tag" style="margin-right:6px;"></i> Rango</span>
                                <select id="swal-role" class="input-dark">
                                    <option value="user" ${u.role === 'user' ? 'selected' : ''}>USER</option>
                                    <option value="premium" ${u.role === 'premium' ? 'selected' : ''}>PREMIUM</option>
                                    <option value="admin" ${u.role === 'admin' ? 'selected' : ''}>ADMIN</option>
                                </select>
                            </div>
                            <div>
                                <span class="swal-label"><i class="fas fa-chart-bar" style="margin-right:6px;"></i> Límite Diario</span>
                                <input id="swal-limit" type="number" class="input-dark" value="${u.limit || 100}">
                            </div>
                        </div>
                    </div>
                `,
                showCancelButton: true,
                showDenyButton: true,
                confirmButtonText: '💾 Guardar',
                denyButtonText: '🗑️ Eliminar',
                confirmButtonColor: '#3b82f6',
                denyButtonColor: '#ef4444',
                cancelButtonColor: 'var(--text-muted)',
                customClass: {
                    confirmButton: 'rounded-2xl font-bold px-6 py-3',
                    denyButton: 'rounded-2xl font-bold px-6 py-3',
                    cancelButton: 'rounded-2xl font-bold px-6 py-3'
                }
            });

            if (formValues) {
                const newData = {
                    username: document.getElementById('swal-user').value.trim(),
                    email: document.getElementById('swal-email').value.trim(),
                    password: document.getElementById('swal-pass').value || u.password,
                    key: document.getElementById('swal-key').value.trim(),
                    role: document.getElementById('swal-role').value,
                    limit: parseInt(document.getElementById('swal-limit').value) || 100
                };

                if (!newData.username || !newData.email || !newData.key) {
                    Swal.fire({
                        icon: 'error',
                        title: 'Error',
                        text: 'Todos los campos son obligatorios',
                        background: 'var(--bg-card)',
                        color: 'var(--text-primary)'
                    });
                    return;
                }

                await updateUser(email, newData);
            } else if (isDenied) {
                deleteUser(email);
            }
        }

        async function updateUser(email, newData) {
            try {
                const res = await fetch('/api/auth/admin/update', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        adminKey: userData.key,
                        targetEmail: email,
                        newData
                    })
                });

                const data = await res.json();

                if (data.status) {
                    Swal.fire({
                        icon: 'success',
                        title: '¡Actualizado!',
                        text: 'Los datos del usuario han sido modificados',
                        background: 'var(--bg-card)',
                        color: 'var(--text-primary)',
                        timer: 1500,
                        showConfirmButton: false
                    });
                    loadUsers();
                } else {
                    throw new Error(data.message || 'Error al actualizar');
                }
            } catch (err) {
                Swal.fire({
                    icon: 'error',
                    title: 'Error',
                    text: err.message || 'Fallo al actualizar el usuario',
                    background: 'var(--bg-card)',
                    color: 'var(--text-primary)'
                });
            }
        }

        async function deleteUser(email) {
            const confirm = await Swal.fire({
                title: '¿Eliminar usuario?',
                text: 'Esta acción es irreversible. ¿Estás seguro?',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: 'Sí, eliminar',
                cancelButtonText: 'Cancelar',
                confirmButtonColor: '#ef4444',
                cancelButtonColor: '#3b82f6',
                background: 'var(--bg-card)',
                color: 'var(--text-primary)'
            });

            if (confirm.isConfirmed) {
                try {
                    const res = await fetch('/api/auth/admin/delete', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            adminKey: userData.key,
                            targetEmail: email
                        })
                    });

                    const data = await res.json();

                    if (data.status) {
                        Swal.fire({
                            icon: 'success',
                            title: 'Eliminado',
                            text: 'El usuario ha sido eliminado',
                            background: 'var(--bg-card)',
                            color: 'var(--text-primary)',
                            timer: 1500,
                            showConfirmButton: false
                        });
                        loadUsers();
                    } else {
                        throw new Error(data.message || 'Error al eliminar');
                    }
                } catch (err) {
                    Swal.fire({
                        icon: 'error',
                        title: 'Error',
                        text: err.message || 'Fallo al eliminar el usuario',
                        background: 'var(--bg-card)',
                        color: 'var(--text-primary)'
                    });
                }
            }
        }
    </script>
</body>
</html>
