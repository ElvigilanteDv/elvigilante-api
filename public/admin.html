<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Staff Panel · Edward</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --bg-primary: #0a0b0e;
            --bg-card: #14161c;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #475569;
            --accent: #3b82f6;
            --accent-pink: #ec4899;
            --accent-gradient: linear-gradient(135deg, #3b82f6, #8b5cf6);
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            --radius: 24px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.light-mode {
            --bg-primary: #f0f2f5;
            --bg-card: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            transition: background var(--transition), color var(--transition);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #safety-block {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            z-index: 10000;
            transition: opacity 0.5s ease;
        }

        #safety-block.hidden {
            opacity: 0;
            pointer-events: none;
        }

        header {
            background: var(--bg-card);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.04);
            position: sticky;
            top: 0;
            z-index: 50;
            box-shadow: var(--shadow);
            transition: background var(--transition), box-shadow var(--transition);
        }

        body.light-mode header {
            border-bottom: 1px solid rgba(0,0,0,0.04);
        }

        .brand {
            font-weight: 800;
            font-size: 1.1rem;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .brand span {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand i {
            color: var(--accent);
            font-size: 1.2rem;
        }

        .theme-toggle {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            color: var(--text-secondary);
            border: none;
            font-size: 0.9rem;
        }

        .theme-toggle:hover {
            background: var(--accent);
            color: white;
            transform: rotate(20deg);
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn-back {
            font-size: 0.7rem;
            font-weight: 700;
            background: var(--bg-primary);
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 12px;
            border: 1px solid rgba(0,0,0,0.04);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }

        body.light-mode .btn-back {
            border: 1px solid rgba(0,0,0,0.04);
        }

        .btn-back:hover {
            border-color: var(--accent);
            color: var(--text-primary);
        }

        .card {
            background: var(--bg-card);
            border-radius: var(--radius);
            border: 1px solid rgba(0,0,0,0.02);
            box-shadow: var(--shadow);
            transition: all var(--transition);
            overflow: hidden;
        }

        body.light-mode .card {
            border: 1px solid rgba(0,0,0,0.02);
        }

        .stat-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 20px 24px;
            border: 1px solid rgba(0,0,0,0.02);
            box-shadow: var(--shadow);
            transition: all var(--transition);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
        }

        body.light-mode .stat-card:hover {
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
        }

        .stat-label {
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-muted);
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-top: 2px;
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            background: rgba(59, 130, 246, 0.08);
            color: var(--accent);
        }

        .stat-icon.pink {
            background: rgba(236, 72, 153, 0.08);
            color: var(--accent-pink);
        }

        .stat-icon.gold {
            background: rgba(245, 158, 11, 0.08);
            color: #f59e0b;
        }

        .stat-icon.green {
            background: rgba(34, 197, 94, 0.08);
            color: #22c55e;
        }

        .stat-icon.red {
            background: rgba(239, 68, 68, 0.08);
            color: #ef4444;
        }

        .stat-icon.purple {
            background: rgba(139, 92, 246, 0.08);
            color: #8b5cf6;
        }

        .btn-filter {
            padding: 10px 16px;
            border-radius: 14px;
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: 1.5px solid transparent;
            transition: var(--transition);
            cursor: pointer;
            background: var(--bg-card);
            color: var(--text-secondary);
            box-shadow: var(--shadow);
            flex: 1;
            text-align: center;
        }

        .btn-filter:hover {
            border-color: var(--accent);
            color: var(--text-primary);
        }

        .btn-filter.active {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(59, 130, 246, 0.06);
        }

        .table-container {
            overflow-x: auto;
            border-radius: var(--radius);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: var(--bg-primary);
        }

        th {
            padding: 16px 20px;
            font-size: 0.6rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-muted);
            text-align: left;
        }

        td {
            padding: 12px 20px;
            border-bottom: 1px solid rgba(0,0,0,0.02);
            font-size: 0.82rem;
        }

        body.light-mode td {
            border-bottom: 1px solid rgba(0,0,0,0.04);
        }

        tr {
            transition: var(--transition);
        }

        tr:hover {
            background: var(--bg-primary);
        }

        .badge-role {
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 0.3px;
            display: inline-block;
        }

        .badge-admin {
            background: rgba(236, 72, 153, 0.12);
            color: var(--accent-pink);
            border: 1px solid rgba(236, 72, 153, 0.2);
        }

        .badge-user {
            background: var(--bg-primary);
            color: var(--text-muted);
            border: 1px solid transparent;
        }

        .badge-lite {
            background: rgba(34, 197, 94, 0.12);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .badge-plus {
            background: rgba(245, 158, 11, 0.12);
            color: #f59e0b;
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        .badge-pro {
            background: rgba(59, 130, 246, 0.12);
            color: var(--accent);
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .badge-expired {
            background: rgba(239, 68, 68, 0.12);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .btn-action {
            width: 36px;
            height: 36px;
            border-radius: 12px;
            border: 1px solid transparent;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
            color: var(--text-secondary);
        }

        .btn-action:hover {
            border-color: var(--accent);
            color: var(--accent);
            transform: translateY(-1px);
        }

        .btn-action.danger:hover {
            border-color: #ef4444;
            color: #ef4444;
        }

        .btn-action.locked {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .btn-action.locked:hover {
            border-color: transparent;
            color: var(--text-secondary);
            transform: none;
        }

        .btn-action.eye:hover {
            border-color: #22c55e;
            color: #22c55e;
        }

        .btn-action.plan:hover {
            border-color: #8b5cf6;
            color: #8b5cf6;
        }

        .search-box {
            position: relative;
        }

        .search-box i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .search-box input {
            padding-left: 40px;
        }

        .input-dark {
            background: var(--bg-primary);
            border: 1.5px solid transparent;
            border-radius: 14px;
            padding: 10px 14px;
            color: var(--text-primary);
            font-size: 0.85rem;
            width: 100%;
            outline: none;
            transition: var(--transition);
            font-family: inherit;
        }

        .input-dark:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.08);
        }

        .input-dark::placeholder {
            color: var(--text-muted);
        }

        .input-dark.font-mono {
            font-family: 'Menlo', 'Monaco', monospace;
            color: var(--accent);
        }

        select.input-dark {
            appearance: none;
            cursor: pointer;
        }

        .swal2-popup {
            border-radius: var(--radius) !important;
            background: var(--bg-card) !important;
            border: 1px solid rgba(0,0,0,0.02) !important;
            padding: 2rem !important;
        }

        body.light-mode .swal2-popup {
            border: 1px solid rgba(0,0,0,0.02) !important;
        }

        .swal-label {
            text-align: left;
            text-transform: uppercase;
            font-weight: 700;
            font-size: 0.6rem;
            letter-spacing: 0.8px;
            color: var(--text-muted);
            display: block;
            margin-bottom: 4px;
            margin-left: 4px;
        }

        .swal-password-container {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .swal-password-container input {
            flex: 1;
        }

        .swal-password-container button {
            background: var(--bg-primary);
            border: 1.5px solid transparent;
            border-radius: 14px;
            padding: 10px 14px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.9rem;
        }

        .swal-password-container button:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .page-title {
            font-size: 1.3rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            padding: 0 4px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .page-title i {
            color: var(--accent);
        }

        .refresh-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-card);
            color: var(--text-secondary);
            border: 1px solid rgba(0,0,0,0.04);
            padding: 10px 20px;
            border-radius: 14px;
            font-size: 0.7rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
        }

        .refresh-btn:hover {
            border-color: var(--accent);
            color: var(--text-primary);
        }

        body.light-mode .refresh-btn {
            border: 1px solid rgba(0,0,0,0.04);
        }

        .days-badge {
            font-size: 0.6rem;
            font-weight: 700;
            padding: 2px 10px;
            border-radius: 12px;
            display: inline-block;
        }

        .days-good {
            background: rgba(34, 197, 94, 0.12);
            color: #22c55e;
        }

        .days-warning {
            background: rgba(245, 158, 11, 0.12);
            color: #f59e0b;
        }

        .days-danger {
            background: rgba(239, 68, 68, 0.12);
            color: #ef4444;
        }

        @media (max-width: 640px) {
            .stat-card { padding: 16px; }
            .stat-value { font-size: 1.3rem; }
            .stat-icon { width: 40px; height: 40px; font-size: 1rem; }
            .btn-filter { font-size: 0.55rem; padding: 8px 12px; }
            th, td { padding: 10px 12px; font-size: 0.7rem; }
        }
    </style>
</head>
<body>

    <div id="safety-block"></div>

    <header>
        <div class="brand" onclick="location.href='/dash'">
            <i class="fas fa-crown"></i>
            <span>Edward · Staff</span>
        </div>
        <div class="header-actions">
            <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn" aria-label="Toggle theme">
                <i class="fas fa-moon"></i>
            </button>
            <button class="btn-back" onclick="location.href='/dash'">
                <i class="fas fa-arrow-left"></i> Volver
            </button>
        </div>
    </header>

    <main class="container mx-auto p-4 max-w-7xl flex-grow pb-12">

        <div class="page-title">
            <i class="fas fa-user-shield"></i> Panel de Administracion
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-6 gap-4 mt-2">
            <div class="stat-card">
                <div>
                    <div class="stat-label"><i class="fas fa-users" style="margin-right:4px;"></i> Total Usuarios</div>
                    <div id="total-count" class="stat-value">0</div>
                </div>
                <div class="stat-icon"><i class="fas fa-users"></i></div>
            </div>
            <div class="stat-card">
                <div>
                    <div class="stat-label"><i class="fas fa-user-check" style="margin-right:4px;"></i> Activos</div>
                    <div id="active-count" class="stat-value" style="color: #22c55e;">0</div>
                </div>
                <div class="stat-icon green"><i class="fas fa-user-check"></i></div>
            </div>
            <div class="stat-card">
                <div>
                    <div class="stat-label"><i class="fas fa-user-shield" style="margin-right:4px;"></i> Admins</div>
                    <div id="admin-count" class="stat-value" style="color: var(--accent-pink);">0</div>
                </div>
                <div class="stat-icon pink"><i class="fas fa-user-shield"></i></div>
            </div>
            <div class="stat-card">
                <div>
                    <div class="stat-label"><i class="fas fa-chart-line" style="margin-right:4px;"></i> Solicitudes Hoy</div>
                    <div id="requests-today" class="stat-value" style="color: #8b5cf6;">0</div>
                </div>
                <div class="stat-icon purple"><i class="fas fa-chart-line"></i></div>
            </div>
            <div class="stat-card">
                <div>
                    <div class="stat-label"><i class="fas fa-ban" style="margin-right:4px;"></i> Bloqueados</div>
                    <div id="blocked-count" class="stat-value" style="color: #ef4444;">0</div>
                </div>
                <div class="stat-icon red"><i class="fas fa-ban"></i></div>
            </div>
            <div class="stat-card">
                <div>
                    <div class="stat-label"><i class="fas fa-crown" style="margin-right:4px;"></i> Planes Pagos</div>
                    <div id="paid-count" class="stat-value" style="color: #f59e0b;">0</div>
                </div>
                <div class="stat-icon gold"><i class="fas fa-crown"></i></div>
            </div>
        </div>

        <div class="flex flex-col sm:flex-row gap-3 mt-6">
            <div class="flex gap-2 flex-1 flex-wrap">
                <button onclick="filterUsers('all')" id="btn-all" class="btn-filter active">Todos</button>
                <button onclick="filterUsers('admin')" id="btn-admin" class="btn-filter">Admins</button>
                <button onclick="filterUsers('pro')" id="btn-pro" class="btn-filter">Pro</button>
                <button onclick="filterUsers('plus')" id="btn-plus" class="btn-filter">Plus</button>
                <button onclick="filterUsers('lite')" id="btn-lite" class="btn-filter">Lite</button>
                <button onclick="filterUsers('free')" id="btn-free" class="btn-filter">Free</button>
                <button onclick="filterUsers('expired')" id="btn-expired" class="btn-filter" style="border-color: rgba(239,68,68,0.2); color:#ef4444;">Expirados</button>
                <button onclick="filterUsers('blocked')" id="btn-blocked" class="btn-filter" style="border-color: rgba(239,68,68,0.2); color:#ef4444;">Bloqueados</button>
                <button onclick="filterUsers('active')" id="btn-active" class="btn-filter" style="border-color: rgba(34,197,94,0.2); color:#22c55e;">Activos</button>
            </div>
            <div class="search-box" style="min-width: 200px;">
                <i class="fas fa-search"></i>
                <input type="text" id="search-input" class="input-dark" placeholder="Buscar usuario..." oninput="searchUsers()">
            </div>
        </div>

        <div class="card mt-6 overflow-hidden">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Usuario / Email</th>
                            <th>Rango</th>
                            <th>Plan</th>
                            <th>Días Restantes</th>
                            <th>Consumo</th>
                            <th>Estado</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="user-table-body">
                        <tr>
                            <td colspan="7" class="text-center py-12 text-[var(--text-muted)] font-medium">
                                <i class="fas fa-spinner fa-spin mr-2"></i> Cargando usuarios...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="flex flex-wrap gap-3 mt-6 justify-between items-center">
            <div class="flex gap-3 flex-wrap">
                <button onclick="loadUsers()" class="refresh-btn">
                    <i class="fas fa-sync-alt"></i> Recargar
                </button>
                <button onclick="openCreateUser()" class="refresh-btn" style="border-color: var(--accent); color: var(--accent);">
                    <i class="fas fa-user-plus"></i> Crear Usuario
                </button>
                <button onclick="exportData()" class="refresh-btn" style="border-color: #22c55e; color: #22c55e;">
                    <i class="fas fa-file-export"></i> Exportar
                </button>
            </div>
            <div class="flex gap-3">
                <button onclick="sendMassEmail()" class="refresh-btn" style="border-color: #8b5cf6; color: #8b5cf6;">
                    <i class="fas fa-envelope"></i> Email Masivo
                </button>
                <button onclick="showSystemLogs()" class="refresh-btn" style="border-color: #f59e0b; color: #f59e0b;">
                    <i class="fas fa-history"></i> Logs
                </button>
            </div>
        </div>

    </main>

    <script>
        const userData = JSON.parse(localStorage.getItem('kazuma_user'));
        let allUsers = [];
        let filteredUsers = [];
        const SUPER_ADMIN = "cololacalempira5@gmail.com";
        let logs = [];

        const PLAN_DURATION = 33; // días

        if (!userData || userData.role !== 'admin') {
            window.location.href = '/dash';
        } else {
            document.body.style.display = 'block';
            loadUsers();
            loadLogs();
        }

        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('theme-btn');
            const icon = btn.querySelector('i');

            body.classList.toggle('light-mode');

            if (body.classList.contains('light-mode')) {
                icon.classList.replace('fa-moon', 'fa-sun');
                localStorage.setItem('kazuma-theme', 'light');
            } else {
                icon.classList.replace('fa-sun', 'fa-moon');
                localStorage.setItem('kazuma-theme', 'dark');
            }
        }

        (function initTheme() {
            const saved = localStorage.getItem('kazuma-theme');
            if (saved === 'light') {
                document.body.classList.add('light-mode');
                document.getElementById('theme-btn').querySelector('i').classList.replace('fa-moon', 'fa-sun');
            }
        })();

        function loadLogs() {
            try {
                const stored = localStorage.getItem('admin_logs');
                logs = stored ? JSON.parse(stored) : [];
            } catch (e) {
                logs = [];
            }
        }

        function addLog(action, details) {
            const entry = {
                timestamp: new Date().toISOString(),
                admin: userData.username || 'admin',
                action: action,
                details: details
            };
            logs.unshift(entry);
            if (logs.length > 100) logs = logs.slice(0, 100);
            localStorage.setItem('admin_logs', JSON.stringify(logs));
        }

        function calcularDiasRestantes(plan, planExpiresAt) {
            if (!plan || plan === 'free' || !planExpiresAt) return 0;
            
            const now = new Date();
            const expire = new Date(planExpiresAt);
            const diffTime = expire - now;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            return diffDays > 0 ? diffDays : 0;
        }

        function getDaysBadge(days) {
            if (days === 0) return '<span class="days-badge days-danger">Expirado</span>';
            if (days <= 5) return `<span class="days-badge days-danger">${days} días</span>`;
            if (days <= 10) return `<span class="days-badge days-warning">${days} días</span>`;
            return `<span class="days-badge days-good">${days} días</span>`;
        }

        async function loadUsers() {
            try {
                const res = await fetch(`/api/auth/admin/all?apiKey=${userData.key}`);
                const data = await res.json();

                if (data.status) {
                    allUsers = data.users || [];
                    
                    // Calcular días restantes para cada usuario
                    allUsers = allUsers.map(u => {
                        u.daysLeft = calcularDiasRestantes(u.plan, u.planExpiresAt);
                        return u;
                    });
                    
                    filteredUsers = allUsers;
                    updateStats();
                    renderTable(allUsers);
                    document.getElementById('safety-block').classList.add('hidden');
                    addLog('Carga de usuarios', 'Lista de usuarios actualizada');
                }
            } catch (e) {
                console.error('Error:', e);
                document.getElementById('user-table-body').innerHTML = `
                    <tr>
                        <td colspan="7" class="text-center py-12 text-red-500 font-medium">
                            <i class="fas fa-exclamation-triangle mr-2"></i> Error al cargar datos
                        </td>
                    </tr>
                `;
            }
        }

        function updateStats() {
            const total = allUsers.length;
            const admins = allUsers.filter(u => u.role === 'admin').length;
            const requests = allUsers.reduce((sum, u) => sum + (u.requestToday || 0), 0);
            const blocked = allUsers.filter(u => u.blocked === true).length;
            const active = allUsers.filter(u => !u.blocked).length;
            const paid = allUsers.filter(u => u.plan && u.plan !== 'free' && u.daysLeft > 0).length;

            document.getElementById('total-count').innerText = total;
            document.getElementById('admin-count').innerText = admins;
            document.getElementById('requests-today').innerText = requests;
            document.getElementById('blocked-count').innerText = blocked;
            document.getElementById('active-count').innerText = active;
            document.getElementById('paid-count').innerText = paid;
        }

                'free': 'badge-user'
            };
            return classes[p] || 'badge-user';
        }

            const p = (plan || 'FREE').toUpperCase();
            const labels = {
                'LITE': 'Lite',
                'PLUS': 'Plus',
                'PRO': 'Pro',
                'FREE': 'Free'
            };
            return labels[p] || p;
        }

        function filterUsers(type) {
            document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
            const btn = document.getElementById(`btn-${type}`);
            if (btn) btn.classList.add('active');

            if (type === 'all') {
                filteredUsers = allUsers;
            } else if (type === 'blocked') {
                filteredUsers = allUsers.filter(u => u.blocked === true);
            } else if (type === 'active') {
                filteredUsers = allUsers.filter(u => !u.blocked);
            } else if (type === 'expired') {
                filteredUsers = allUsers.filter(u => u.plan && u.plan !== 'free' && u.daysLeft === 0);
            } else if (type === 'admin') {
                filteredUsers = allUsers.filter(u => u.role === 'admin');
            } else if (type === 'free') {
                filteredUsers = allUsers.filter(u => (u.plan || 'free').toLowerCase() === 'free');
            } else {
                filteredUsers = allUsers.filter(u => (u.plan || 'free').toLowerCase() === type);
            }

            const searchText = document.getElementById('search-input').value.toLowerCase();
            if (searchText) {
                filteredUsers = filteredUsers.filter(u =>
                    u.username.toLowerCase().includes(searchText) ||
                    u.email.toLowerCase().includes(searchText)
                );
            }

            renderTable(filteredUsers);
        }

        function searchUsers() {
            const searchText = document.getElementById('search-input').value.toLowerCase();
            const activeFilter = document.querySelector('.btn-filter.active');
            const filterType = activeFilter ? activeFilter.id.replace('btn-', '') : 'all';

            let baseList = allUsers;
            if (filterType === 'blocked') {
                baseList = allUsers.filter(u => u.blocked === true);
            } else if (filterType === 'active') {
                baseList = allUsers.filter(u => !u.blocked);
            } else if (filterType === 'expired') {
                baseList = allUsers.filter(u => u.plan && u.plan !== 'free' && u.daysLeft === 0);
            } else if (filterType === 'admin') {
                baseList = allUsers.filter(u => u.role === 'admin');
            } else if (filterType !== 'all') {
                baseList = allUsers.filter(u => (u.plan || 'free').toLowerCase() === filterType);
            }

            if (searchText) {
                filteredUsers = baseList.filter(u =>
                    u.username.toLowerCase().includes(searchText) ||
                    u.email.toLowerCase().includes(searchText)
                );
            } else {
                filteredUsers = baseList;
            }

            renderTable(filteredUsers);
        }

                            <input id="swal-pass" class="input-dark" value="${u.password || ''}" type="text">
                            <button onclick="togglePasswordVisibility('swal-pass', this)" type="button">
                                <i class="fas fa-eye-slash"></i>
                            </button>
                        </div>

                        <span class="swal-label"><i class="fas fa-key" style="margin-right:6px;"></i> API Key</span>
                        <input id="swal-key" class="input-dark font-mono mb-3" value="${u.key || ''}">

                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <span class="swal-label"><i class="fas fa-tag" style="margin-right:6px;"></i> Rango</span>
                                <select id="swal-role" class="input-dark">
                                    <option value="user" ${u.role === 'user' ? 'selected' : ''}>USER</option>
                                    <option value="admin" ${u.role === 'admin' ? 'selected' : ''}>ADMIN</option>
                                </select>
                            </div>
                            <div>
                                <span class="swal-label"><i class="fas fa-chart-bar" style="margin-right:6px;"></i> Limite Diario</span>
                                <input id="swal-limit" type="number" class="input-dark" value="${u.limit || 100}">
                            </div>
                        </div>

                        <div style="margin-top:12px;">
                            <span class="swal-label"><i class="fas fa-crown" style="margin-right:6px;"></i> Plan</span>
                            <div style="display:flex; gap:8px; align-items:center;">
                                <select id="swal-plan" class="input-dark" style="flex:1;">
                                    <option value="free" ${u.plan === 'free' ? 'selected' : ''}>Free</option>
                                    <option value="lite" ${u.plan === 'lite' ? 'selected' : ''}>Lite</option>
                                    <option value="plus" ${u.plan === 'plus' ? 'selected' : ''}>Plus</option>
                                    <option value="pro" ${u.plan === 'pro' ? 'selected' : ''}>Pro</option>
                                </select>
                                <button onclick="activatePlanFromModal('${u.email}')" type="button" style="background: linear-gradient(135deg, #22c55e, #16a34a); color:white; border:none; border-radius:12px; padding:10px 16px; font-weight:700; font-size:0.65rem; cursor:pointer; white-space:nowrap;">
                                    <i class="fas fa-play"></i> Activar
                                </button>
                            </div>
                            <div style="margin-top:8px; padding:10px; background:var(--bg-primary); border-radius:10px; font-size:0.7rem; color:var(--text-secondary);">
                                <i class="fas fa-info-circle" style="color:var(--accent);"></i>
                                Plan actual: <strong>${u.plan ? u.plan.toUpperCase() : 'FREE'}</strong>
                                ${u.plan && u.plan !== 'free' && u.daysLeft !== undefined ? `| Días restantes: <strong style="color:${u.daysLeft > 5 ? '#22c55e' : '#ef4444'};">${u.daysLeft}</strong>` : ''}
                                ${u.planExpiresAt ? `| Expira: <strong>${new Date(u.planExpiresAt).toLocaleDateString()}</strong>` : ''}
                            </div>
                        </div>
                    </div>
                `,
                showCancelButton: true,
                showDenyButton: true,
                confirmButtonText: 'Guardar Cambios',
                denyButtonText: 'Eliminar Usuario',
                confirmButtonColor: '#3b82f6',
                denyButtonColor: '#ef4444',
                cancelButtonColor: 'var(--text-muted)',
                preConfirm: () => {
                    const username = document.getElementById('swal-user').value.trim();
                    const email = document.getElementById('swal-email').value.trim();
                    const password = document.getElementById('swal-pass').value;
                    const key = document.getElementById('swal-key').value.trim();
                    const role = document.getElementById('swal-role').value;
                    const limit = parseInt(document.getElementById('swal-limit').value) || 100;
                    const plan = document.getElementById('swal-plan').value;

                    if (!username || !email || !key) {
                        Swal.showValidationMessage('Usuario, Email y API Key son obligatorios');
                        return false;
                    }

                    return { username, email, password, key, role, limit, plan };
                }
            });

            if (formValues) {
                await updateUser(email, formValues);
            } else if (isDenied) {
                deleteUser(email);
            }
        }

        function activatePlanFromModal(email) {
            const planSelect = document.getElementById('swal-plan');
            const planType = planSelect.value;

            if (planType === 'free') {
                Swal.fire({
                    icon: 'warning',
                    title: 'Plan Free',
                    text: 'No se puede activar el plan Free. Selecciona Lite, Plus o Pro.',
                    background: 'var(--bg-card)',
                    color: 'var(--text-primary)',
                    confirmButtonColor: '#3b82f6'
                });
                return;
            }

            const confirm = Swal.fire({
                title: 'Activar Plan',
                html: `
                    <div style="text-align:center; padding:10px 0;">
                        <p style="color:var(--text-secondary); font-size:0.9rem; margin-bottom:10px;">
                            Activar plan <strong style="color:var(--accent);">${planType.toUpperCase()}</strong>
                        </p>
                        <div style="background:var(--bg-primary); padding:14px; border-radius:12px; text-align:left;">
                            <p style="font-size:0.8rem; color:var(--text-secondary); margin:4px 0;">
                                <i class="fas fa-check-circle" style="color:#22c55e;"></i> Duracion: <strong>33 dias</strong>
                            </p>
                            <p style="font-size:0.8rem; color:var(--text-secondary); margin:4px 0;">
                                <i class="fas fa-check-circle" style="color:#22c55e;"></i> Comienza: <strong>${new Date().toLocaleDateString()}</strong>
                            </p>
                            <p style="font-size:0.8rem; color:var(--text-secondary); margin:4px 0;">
                                <i class="fas fa-check-circle" style="color:#22c55e;"></i> Expira: <strong>${new Date(Date.now() + 33 * 24 * 60 * 60 * 1000).toLocaleDateString()}</strong>
                            </p>
                        </div>
                    </div>
                `,
                showCancelButton: true,
                confirmButtonText: 'Si, activar',
                cancelButtonText: 'Cancelar',
                confirmButtonColor: '#22c55e',
                cancelButtonColor: '#3b82f6',
                background: 'var(--bg-card)',
                color: 'var(--text-primary)'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    await activatePlan(email, planType);
                }
            });
        }

        async function activatePlan(email, planType) {
            try {
                const res = await fetch('/api/auth/admin/activate-plan', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        adminKey: userData.key,
                        targetEmail: email,
                        plan: planType,
                        duration: 33
                    })
                });

                const data = await res.json();

                if (data.status) {
                    addLog('Activar plan', `Plan ${planType} activado para ${email}`);
                    Swal.fire({
                        icon: 'success',
                        title: 'Plan Activado',
                        text: `Plan ${planType.toUpperCase()} activado por 33 días`,
                        background: 'var(--bg-card)',
                        color: 'var(--text-primary)',
                        timer: 2000,
                        showConfirmButton: false
                    });
                    loadUsers();
                } else {
                    throw new Error(data.message || 'Error al activar plan');
                }
            } catch (err) {
                Swal.fire({
                    icon: 'error',
                    title: 'Error',
                    text: err.message || 'Fallo al activar el plan',
                    background: 'var(--bg-card)',
                    color: 'var(--text-primary)'
                });
            }
        }

        async function updateUser(email, newData) {
            try {
                const res = await fetch('/api/auth/admin/update', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        adminKey: userData.key,
                        targetEmail: email,
                        newData
                    })
                });

                const data = await res.json();

                if (data.status) {
                    const u = allUsers.find(user => user.email === email);
                    addLog('Actualizar usuario', `Usuario ${u.username} actualizado`);
                    Swal.fire({
                        icon: 'success',
                        title: 'Actualizado',
                        text: 'Los datos del usuario han sido modificados',
                        background: 'var(--bg-card)',
                        color: 'var(--text-primary)',
                        timer: 1500,
                        showConfirmButton: false
                    });
                    loadUsers();
                } else {
                    throw new Error(data.message || 'Error al actualizar');
                }
            } catch (err) {
                Swal.fire({
                    icon: 'error',
                    title: 'Error',
                    text: err.message || 'Fallo al actualizar el usuario',
                    background: 'var(--bg-card)',
                    color: 'var(--text-primary)'
                });
            }
        }

        async function deleteUser(email) {
            const u = allUsers.find(user => user.email === email);
            const confirm = await Swal.fire({
                title: 'Eliminar usuario',
                text: `¿Estas seguro de eliminar a ${u.username}? Esta accion es irreversible.`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: 'Si, eliminar',
                cancelButtonText: 'Cancelar',
                confirmButtonColor: '#ef4444',
                cancelButtonColor: '#3b82f6',
                background: 'var(--bg-card)',
                color: 'var(--text-primary)'
            });

            if (confirm.isConfirmed) {
                try {
                    const res = await fetch('/api/auth/admin/delete', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            adminKey: userData.key,
                            targetEmail: email
                        })
                    });

                    const data = await res.json();

                    if (data.status) {
                        addLog('Eliminar usuario', `Usuario ${u.username} eliminado`);
                        Swal.fire({
                            icon: 'success',
                            title: 'Eliminado',
                            text: 'El usuario ha sido eliminado',
                            background: 'var(--bg-card)',
                            color: 'var(--text-primary)',
                            timer: 1500,
                            showConfirmButton: false
                        });
                        loadUsers();
                    } else {
                        throw new Error(data.message || 'Error al eliminar');
                    }
                } catch (err) {
                    Swal.fire({
                        icon: 'error',
                        title: 'Error',
                        text: err.message || 'Fallo al eliminar el usuario',
                        background: 'var(--bg-card)',
                        color: 'var(--text-primary)'
                    });
                }
            }
        }

        function exportData() {
            const dataStr = JSON.stringify(allUsers, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `usuarios_export_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);

            addLog('Exportar datos', 'Datos de usuarios exportados');
            Swal.fire({
                icon: 'success',
                title: 'Exportado',
                text: 'Los datos han sido exportados correctamente',
                background: 'var(--bg-card)',
                color: 'var(--text-primary)',
                timer: 1500,
                showConfirmButton: false
            });
        }

        function sendMassEmail() {
            Swal.fire({
                title: 'Enviar Email Masivo',
                html: `
                    <div style="text-align:left;">
                        <span class="swal-label"><i class="fas fa-tag" style="margin-right:6px;"></i> Destinatarios</span>
                        <select id="swal-email-target" class="input-dark mb-3">
                            <option value="all">Todos los usuarios</option>
                            <option value="active">Usuarios activos</option>
                            <option value="paid">Usuarios con plan pago</option>
                            <option value="free">Usuarios Free</option>
                            <option value="lite">Usuarios Lite</option>
                            <option value="plus">Usuarios Plus</option>
                            <option value="pro">Usuarios Pro</option>
                            <option value="expired">Usuarios con plan expirado</option>
                        </select>

                        <span class="swal-label"><i class="fas fa-tag" style="margin-right:6px;"></i> Asunto</span>
                        <input id="swal-email-subject" class="input-dark mb-3" placeholder="Asunto del correo">

                        <span class="swal-label"><i class="fas fa-envelope" style="margin-right:6px;"></i> Mensaje</span>
                        <textarea id="swal-email-body" class="input-dark" rows="4" placeholder="Contenido del mensaje..."></textarea>
                    </div>
                `,
                showCancelButton: true,
                confirmButtonText: 'Enviar Email',
                cancelButtonText: 'Cancelar',
                confirmButtonColor: '#8b5cf6',
                background: 'var(--bg-card)',
                color: 'var(--text-primary)',
                width: '480px',
                preConfirm: () => {
                    const target = document.getElementById('swal-email-target').value;
                    const subject = document.getElementById('swal-email-subject').value.trim();
                    const body = document.getElementById('swal-email-body').value.trim();

                    if (!subject || !body) {
                        Swal.showValidationMessage('Asunto y mensaje son obligatorios');
                        return false;
                    }

                    return { target, subject, body };
                }
            }).then(async (result) => {
                if (result.isConfirmed) {
                    const data = result.value;
                    let recipients = [];
                    let targetLabel = '';

                    if (data.target === 'all') {
                        recipients = allUsers;
                        targetLabel = 'todos los usuarios';
                    } else if (data.target === 'active') {
                        recipients = allUsers.filter(u => !u.blocked);
                        targetLabel = 'usuarios activos';
                    } else if (data.target === 'paid') {
                        recipients = allUsers.filter(u => u.plan && u.plan !== 'free' && u.daysLeft > 0);
                        targetLabel = 'usuarios con plan pago';
                    } else if (data.target === 'expired') {
                        recipients = allUsers.filter(u => u.plan && u.plan !== 'free' && u.daysLeft === 0);
                        targetLabel = 'usuarios con plan expirado';
                    } else if (data.target === 'free') {
                        recipients = allUsers.filter(u => !u.plan || u.plan === 'free');
                        targetLabel = 'usuarios Free';
                    } else {
                        recipients = allUsers.filter(u => (u.plan || '').toLowerCase() === data.target);
                        targetLabel = `usuarios ${data.target}`;
                    }

                    if (recipients.length === 0) {
                        Swal.fire({
                            icon: 'warning',
                            title: 'Sin destinatarios',
                            text: 'No hay usuarios que coincidan con el filtro seleccionado',
                            background: 'var(--bg-card)',
                            color: 'var(--text-primary)'
                        });
                        return;
                    }

                    const confirm = await Swal.fire({
                        title: 'Confirmar envio',
                        text: `Se enviara a ${recipients.length} ${targetLabel}`,
                        icon: 'question',
                        showCancelButton: true,
                        confirmButtonText: 'Si, enviar',
                        cancelButtonText: 'Cancelar',
                        confirmButtonColor: '#22c55e',
                        background: 'var(--bg-card)',
                        color: 'var(--text-primary)'
                    });

                    if (confirm.isConfirmed) {
                        try {
                            const res = await fetch('/api/auth/admin/send-email', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    adminKey: userData.key,
                                    recipients: recipients.map(u => u.email),
                                    subject: data.subject,
                                    body: data.body
                                })
                            });

                            const response = await res.json();

                            if (response.status) {
                                addLog('Email masivo', `Enviado a ${recipients.length} usuarios`);
                                Swal.fire({
                                    icon: 'success',
                                    title: 'Emails enviados',
                                    text: `Se enviaron ${recipients.length} emails correctamente`,
                                    background: 'var(--bg-card)',
                                    color: 'var(--text-primary)',
                                    timer: 2000,
                                    showConfirmButton: false
                                });
                            } else {
                                throw new Error(response.message || 'Error al enviar emails');
                            }
                        } catch (err) {
                            Swal.fire({
                                icon: 'error',
                                title: 'Error',
                                text: err.message || 'Fallo al enviar emails',
                                background: 'var(--bg-card)',
                                color: 'var(--text-primary)'
                            });
                        }
                    }
                }
            });
        }

        function showSystemLogs() {
            if (logs.length === 0) {
                Swal.fire({
                    title: 'Registro de Actividad',
                    text: 'No hay registros disponibles',
                    icon: 'info',
                    background: 'var(--bg-card)',
                    color: 'var(--text-primary)',
                    confirmButtonColor: '#3b82f6'
                });
                return;
            }

            let logHtml = logs.map(log => `
                <div style="display:flex; gap:10px; padding:8px 0; border-bottom:1px solid rgba(0,0,0,0.04); font-size:0.75rem;">
                    <span style="color:var(--text-muted); font-size:0.65rem; min-width:150px;">${new Date(log.timestamp).toLocaleString()}</span>
                    <span style="color:var(--accent); font-weight:700; min-width:100px;">${log.admin}</span>
                    <span style="color:var(--text-secondary);">${log.action}</span>
                    <span style="color:var(--text-muted); font-size:0.65rem;">${log.details || ''}</span>
                </div>
            `).join('');

            Swal.fire({
                title: 'Registro de Actividad',
                html: `
                    <div style="max-height:400px; overflow-y:auto; text-align:left;">
                        ${logHtml}
                    </div>
                `,
                width: '650px',
                confirmButtonText: 'Cerrar',
                confirmButtonColor: '#3b82f6',
                background: 'var(--bg-card)',
                color: 'var(--text-primary)',
                showCloseButton: true,
                customClass: {
                    popup: 'rounded-2xl'
                }
            });
        }
    </script>
</body>
</html>
