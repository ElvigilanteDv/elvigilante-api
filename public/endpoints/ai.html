<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IA · Edward</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.google.com/recaptcha/api.js?render=6Lfw-dwsAAAAACc6y5K4sfFnplSqbskYPia1ADh5"></script>

    <style>
        :root {
            --bg-primary: #0a0b0e;
            --bg-card: #14161c;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #475569;
            --accent: #3b82f6;
            --accent-purple: #8b5cf6;
            --accent-gradient: linear-gradient(135deg, #3b82f6, #8b5cf6);
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            --radius: 24px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.light-mode {
            --bg-primary: #f0f2f5;
            --bg-card: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            transition: background var(--transition), color var(--transition);
            min-height: 100vh;
        }

        #safety-block {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            z-index: 10000;
            transition: opacity 0.5s ease;
        }

        #safety-block.hidden {
            opacity: 0;
            pointer-events: none;
        }

        header {
            background: var(--bg-card);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.04);
            position: sticky;
            top: 0;
            z-index: 50;
            box-shadow: var(--shadow);
            transition: background var(--transition), box-shadow var(--transition);
        }

        body.light-mode header {
            border-bottom: 1px solid rgba(0,0,0,0.04);
        }

        .brand {
            font-weight: 800;
            font-size: 1.1rem;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .brand span {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand i {
            color: var(--accent);
            font-size: 1.2rem;
        }

        .theme-toggle {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            color: var(--text-secondary);
            border: none;
            font-size: 0.9rem;
        }

        .theme-toggle:hover {
            background: var(--accent);
            color: white;
            transform: rotate(20deg);
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn-back {
            font-size: 0.7rem;
            font-weight: 700;
            background: var(--bg-primary);
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 12px;
            border: 1px solid rgba(0,0,0,0.04);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }

        body.light-mode .btn-back {
            border: 1px solid rgba(0,0,0,0.04);
        }

        .btn-back:hover {
            border-color: var(--accent);
            color: var(--text-primary);
        }

        .card {
            background: var(--bg-card);
            border-radius: var(--radius);
            border: 1px solid rgba(0,0,0,0.02);
            box-shadow: var(--shadow);
            transition: all var(--transition);
            overflow: hidden;
            margin-bottom: 20px;
        }

        body.light-mode .card {
            border: 1px solid rgba(0,0,0,0.02);
        }

        .card-header {
            padding: 18px 24px 14px;
            border-bottom: 1px solid rgba(0,0,0,0.04);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        body.light-mode .card-header {
            border-bottom: 1px solid rgba(0,0,0,0.04);
        }

        .card-header .icon {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .card-header .icon.gemini {
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent);
        }

        .card-header h3 {
            font-size: 0.85rem;
            font-weight: 700;
            margin: 0;
        }

        .card-header .badge {
            font-size: 0.55rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 2px 12px;
            border-radius: 20px;
            background: rgba(59, 130, 246, 0.08);
            color: var(--accent);
            border: 1px solid rgba(59, 130, 246, 0.1);
            margin-left: auto;
        }

        .card-body {
            padding: 18px 24px 20px;
        }

        .code-box {
            background: var(--bg-primary);
            padding: 10px 14px;
            border-radius: 12px;
            font-family: 'JetBrains Mono', 'Menlo', monospace;
            font-size: 0.65rem;
            color: var(--accent);
            border: 1px solid rgba(0,0,0,0.04);
            word-break: break-all;
            margin-bottom: 16px;
            overflow-x: auto;
            white-space: nowrap;
        }

        body.light-mode .code-box {
            border: 1px solid rgba(0,0,0,0.04);
        }

        .input-test {
            width: 100%;
            background: var(--bg-primary);
            border: 1.5px solid transparent;
            padding: 12px 16px;
            border-radius: 14px;
            color: var(--text-primary);
            outline: none;
            font-size: 0.85rem;
            transition: var(--transition);
            font-family: inherit;
        }

        .input-test::placeholder {
            color: var(--text-muted);
        }

        .input-test:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.08);
        }

        .input-test.textarea {
            min-height: 100px;
            resize: vertical;
            font-family: inherit;
        }

        .input-group {
            margin-bottom: 14px;
        }

        .input-group label {
            display: block;
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .input-group label i {
            margin-right: 6px;
        }

        .btn-test {
            background: var(--accent-gradient);
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 14px;
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 4px;
            box-shadow: 0 4px 16px rgba(59, 130, 246, 0.15);
        }

        .btn-test:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.25);
        }

        .btn-test:active {
            transform: translateY(0);
        }

        .result-box {
            background: var(--bg-primary);
            color: #22d3ee;
            padding: 16px;
            border-radius: 14px;
            margin-top: 14px;
            font-size: 0.65rem;
            font-family: 'JetBrains Mono', 'Menlo', monospace;
            border: 1px solid rgba(0,0,0,0.04);
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 400px;
            overflow-y: auto;
            display: none;
            line-height: 1.6;
        }

        body.light-mode .result-box {
            border: 1px solid rgba(0,0,0,0.04);
        }

        .result-box::-webkit-scrollbar { width: 4px; }
        .result-box::-webkit-scrollbar-track { background: transparent; }
        .result-box::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        .btn-copy-json {
            background: var(--bg-primary);
            color: var(--text-secondary);
            width: 100%;
            padding: 10px;
            border-radius: 0 0 var(--radius) var(--radius);
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: none;
            border: none;
            border-top: 1px solid rgba(0,0,0,0.04);
            cursor: pointer;
            transition: var(--transition);
        }

        body.light-mode .btn-copy-json {
            border-top: 1px solid rgba(0,0,0,0.04);
        }

        .btn-copy-json:hover {
            color: var(--accent);
            background: rgba(59, 130, 246, 0.04);
        }

        .page-title {
            font-size: 1.3rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            padding: 0 4px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .page-title i {
            color: var(--accent);
        }

        .grecaptcha-badge { z-index: 9999 !important; }

        @media (max-width: 480px) {
            .card-header { padding: 14px 16px; }
            .card-body { padding: 14px 16px; }
            .code-box { font-size: 0.55rem; padding: 8px 12px; }
            .page-title { font-size: 1.1rem; }
            .result-box { font-size: 0.55rem; max-height: 250px; }
            .input-test.textarea { min-height: 80px; }
        }
    </style>
</head>
<body>

    <div id="safety-block"></div>

    <header>
        <div class="brand" onclick="location.href='/dash'">
            <i class="fas fa-crown"></i>
            <span>Edward</span>
        </div>
        <div class="header-actions">
            <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn" aria-label="Toggle theme">
                <i class="fas fa-moon"></i>
            </button>
            <button class="btn-back" onclick="location.href='/dash'">
                <i class="fas fa-arrow-left"></i> Volver
            </button>
        </div>
    </header>

    <main class="container mx-auto p-4 max-w-2xl pb-12">
        <div class="page-title">
            <i class="fas fa-brain"></i> Inteligencia Artificial
        </div>

        <!-- Gemini -->
        <div class="card">
            <div class="card-header">
                <div class="icon gemini"><i class="fas fa-robot"></i></div>
                <h3>Google Gemini</h3>
                <span class="badge">AI Model</span>
            </div>
            <div class="card-body">
                <div class="code-box" id="gemini-path">GET /api/ai/gemini?apiKey=</div>

                <div class="input-group">
                    <label><i class="fas fa-cookie"></i> Cookie de Sesión</label>
                    <input id="cookie-gemini" class="input-test" placeholder="Tu session cookie de Gemini...">
                </div>

                <div class="input-group" style="margin-bottom: 0;">
                    <label><i class="fas fa-comment"></i> Mensaje</label>
                    <textarea id="text-gemini" class="input-test textarea" placeholder="Escribe algo para Gemini..."></textarea>
                </div>

                <button class="btn-test" onclick="testAi('gemini', '/api/ai/gemini')">
                    <i class="fas fa-paper-plane mr-2"></i> Enviar a Gemini
                </button>

                <div id="res-gemini" class="result-box"></div>
            </div>
            <button id="copy-gemini" class="btn-copy-json" onclick="copyResult('gemini')">
                <i class="fas fa-copy mr-2"></i> Copiar Respuesta
            </button>
        </div>

    </main>

    <script>
        const userData = JSON.parse(localStorage.getItem('kazuma_user'));

        if (!userData) {
            window.location.href = '/login';
        } else {
            document.addEventListener("DOMContentLoaded", () => {
                // Cargar tema
                const savedTheme = localStorage.getItem('kazuma-theme');
                if (savedTheme === 'light') {
                    document.body.classList.add('light-mode');
                    document.getElementById('theme-btn').querySelector('i').classList.replace('fa-moon', 'fa-sun');
                }

                // Actualizar path con API key
                const pathEl = document.getElementById('gemini-path');
                if (pathEl) pathEl.innerText += `${userData.key}&text=...&cookie=...`;

                // Ocultar safety block
                setTimeout(() => {
                    document.getElementById('safety-block').classList.add('hidden');
                }, 400);
            });
        }

        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('theme-btn');
            const icon = btn.querySelector('i');

            body.classList.toggle('light-mode');

            if (body.classList.contains('light-mode')) {
                icon.classList.replace('fa-moon', 'fa-sun');
                localStorage.setItem('kazuma-theme', 'light');
            } else {
                icon.classList.replace('fa-sun', 'fa-moon');
                localStorage.setItem('kazuma-theme', 'dark');
            }
        }

        async function testAi(id, route) {
            const textVal = document.getElementById(`text-gemini`).value.trim();
            const cookieVal = document.getElementById(`cookie-gemini`).value.trim();
            const resBox = document.getElementById(`res-${id}`);
            const copyBtn = document.getElementById(`copy-${id}`);

            if (!textVal) {
                Swal.fire({
                    icon: 'warning',
                    title: 'Falta el mensaje',
                    text: 'Escribe algo para que Gemini procese',
                    background: 'var(--bg-card)',
                    color: 'var(--text-primary)',
                    confirmButtonColor: '#3b82f6'
                });
                return;
            }

            if (!cookieVal) {
                Swal.fire({
                    icon: 'warning',
                    title: 'Cookie requerida',
                    text: 'Ingresa tu cookie de sesión de Gemini',
                    background: 'var(--bg-card)',
                    color: 'var(--text-primary)',
                    confirmButtonColor: '#3b82f6'
                });
                return;
            }

            resBox.style.display = 'block';
            resBox.innerText = "⏳ Procesando solicitud...";
            copyBtn.style.display = 'none';

            try {
                const url = `${route}?apiKey=${userData.key}&text=${encodeURIComponent(textVal)}&cookie=${encodeURIComponent(cookieVal)}`;
                const response = await fetch(url);
                const data = await response.json();

                resBox.innerText = JSON.stringify(data, null, 2);
                copyBtn.style.display = 'block';
            } catch (err) {
                resBox.innerText = "❌ Error de conexión";
                copyBtn.style.display = 'block';
            }
        }

        function copyResult(id) {
            const text = document.getElementById(`res-${id}`).innerText;
            if (!text || text.includes("⏳") || text.includes("❌")) {
                Swal.fire({
                    icon: 'warning',
                    title: 'Sin datos',
                    text: 'Ejecuta una consulta primero',
                    background: 'var(--bg-card)',
                    color: 'var(--text-primary)',
                    confirmButtonColor: '#3b82f6'
                });
                return;
            }
            navigator.clipboard.writeText(text);
            Swal.fire({
                toast: true,
                position: 'top-end',
                icon: 'success',
                title: '¡Copiado!',
                showConfirmButton: false,
                timer: 1500,
                background: 'var(--bg-card)',
                color: 'var(--text-primary)'
            });
        }

        window.onload = () => {
            grecaptcha.ready(() => {
                grecaptcha.execute('6Lfw-dwsAAAAACc6y5K4sfFnplSqbskYPia1ADh5', { action: 'ai_test' });
            });
        };
    </script>
</body>
</html>
