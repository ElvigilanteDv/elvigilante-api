<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Herramientas | elvigilante API</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.google.com/recaptcha/api.js?render=6Lfw-dwsAAAAACc6y5K4sfFnplSqbskYPia1ADh5"></script>

    <style>
        :root { --neon-blue: #00f3ff; --dark-bg: #09090b; --card-bg: #11111d; --text-main: #ffffff; --code-bg: #05050a; }
        body { background-color: var(--dark-bg); color: var(--text-main); font-family: 'Inter', sans-serif; }
        #safety-block { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; }
        .glass { background: var(--card-bg); border: 1px solid rgba(0, 243, 255, 0.1); border-radius: 24px; }
        .code-box { background: var(--code-bg); padding: 12px; border-radius: 12px; font-family: monospace; font-size: 0.7rem; color: var(--neon-blue); border: 1px solid rgba(0,243,255,0.1); word-break: break-all; margin: 15px 0; }
        .input-test, select { width: 100%; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); padding: 14px; border-radius: 12px; color: #fff; outline: none; margin-bottom: 10px; font-size: 0.8rem; }
        .btn-test { background: var(--neon-blue); color: #000; border: none; padding: 14px; width: 100%; border-radius: 12px; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        .btn-test:hover { filter: brightness(1.2); transform: scale(1.01); }
        .img-result { width: 100%; border-radius: 15px; border: 2px solid var(--neon-blue); display: none; margin-top: 15px; }
        .result-box { 
            background: var(--code-bg); color: #00ffcc; padding: 15px; border-radius: 12px; 
            margin-top: 15px; font-size: 0.7rem; font-family: monospace; 
            border: 1px solid rgba(0, 255, 204, 0.1); white-space: pre-wrap; 
            word-break: break-all; max-height: 300px; overflow-y: auto; display: none;
        }
        .btn-copy-json {
            background: rgba(255, 255, 255, 0.05); color: var(--text-main);
            width: 100%; padding: 10px; border-radius: 0 0 15px 15px;
            font-size: 10px; font-weight: 800; border-top: 1px solid rgba(255,255,255,0.05);
            display: none; cursor: pointer; transition: 0.3s;
        }
        .btn-copy-json:hover { background: rgba(0, 243, 255, 0.1); color: var(--neon-blue); }
        h2 { border-left: 5px solid var(--neon-blue); padding-left: 15px; font-weight: 900; }
        .grecaptcha-badge { width: 70px !important; overflow: hidden !important; transition: 0.3s !important; right: 0px !important; bottom: 20px !important; z-index: 9999 !important; }
        .rarity-badge { display: inline-block; padding: 4px 8px; border-radius: 8px; font-size: 10px; font-weight: bold; }
        .rarity-SSR { background: #ffd700; color: #000; }
        .rarity-SR { background: #c0c0c0; color: #000; }
        .rarity-R { background: #cd7f32; color: #000; }
        .gender-selector { display: flex; gap: 8px; margin-bottom: 12px; }
        .gender-btn { flex: 1; padding: 10px; border-radius: 12px; border: 1px solid rgba(0,243,255,0.2); background: rgba(0,243,255,0.05); color: #fff; font-size: 0.78rem; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .gender-btn.active { background: var(--neon-blue); color: #000; border-color: var(--neon-blue); }
        .audio-player { width: 100%; margin-top: 15px; border-radius: 12px; display: none; accent-color: var(--neon-blue); }
    </style>
</head>
<body class="min-h-screen pb-10">
    <div id="safety-block"></div>
    <header class="p-4 flex justify-between items-center sticky top-0 z-50 bg-[#09090b]/80 backdrop-blur-md border-b border-white/5">
        <div class="font-black text-xl tracking-tighter cursor-pointer" onclick="location.href='/dash'">ELVIGILANTE <span style="color: var(--neon-blue)">DASH</span></div>
        <button onclick="location.href='/dash'" class="text-xs font-bold bg-white/5 px-4 py-2 rounded-xl border border-white/10"><i class="fas fa-home"></i></button>
    </header>

    <main class="container mx-auto p-4 max-w-2xl">
        <h2 class="text-xl uppercase tracking-tighter my-6">Herramientas</h2>

        <!-- Screenshot Web -->
        <div class="glass p-6 mb-6">
            <div class="font-bold text-sm uppercase mb-2"><i class="fas fa-camera text-cyan-400"></i> Screenshot Web</div>
            <div class="code-box" id="ss-path">GET /api/tools/ssweb?apiKey=</div>
            <input id="url-ss" class="input-test" placeholder="URL del sitio...">
            <div class="grid grid-cols-2 gap-3">
                <select id="device-ss"><option value="desktop">Escritorio</option><option value="tablet">Tablet</option><option value="phone">Móvil</option></select>
                <select id="theme-ss"><option value="dark">Dark</option><option value="light">Light</option></select>
            </div>
            <button class="btn-test" onclick="testMedia('ssweb')">Capturar Pantalla</button>
            <img id="view-ssweb" class="img-result">
        </div>

        <!-- QR Generator -->
        <div class="glass p-6 mb-6">
            <div class="font-bold text-sm uppercase mb-2"><i class="fas fa-qrcode text-cyan-400"></i> QR Generator</div>
            <div class="code-box" id="qr-path">GET /api/tools/qr?apiKey=</div>
            <input id="text-qr" class="input-test" placeholder="Texto o URL...">
            <button class="btn-test" onclick="testMedia('qr')">Generar QR</button>
            <div class="text-center"><img id="view-qr" class="img-result mx-auto !w-48"></div>
        </div>

        <!-- TTS -->
        <div class="glass p-6 mb-1 overflow-hidden">
            <div class="font-bold text-sm uppercase mb-2"><i class="fas fa-microphone text-cyan-400"></i> Text to Speech</div>
            <div class="code-box" id="tts-path">GET /api/tools/tts?apiKey=</div>
            <p class="text-xs text-white/40 mb-3">Convierte texto en voz. Elige el género:</p>
            <div class="gender-selector">
                <button class="gender-btn active" id="btn-mujer" onclick="setGenero('mujer')">👩 Mujer</button>
                <button class="gender-btn" id="btn-hombre" onclick="setGenero('hombre')">👨 Hombre</button>
            </div>
            <textarea id="texto-tts" class="input-test" rows="3" placeholder="Escribe el texto que quieres escuchar..." style="resize:none; height:90px;"></textarea>
            <button class="btn-test" onclick="testTTS()">🎙️ Generar Voz</button>
            <audio id="audio-tts" class="audio-player" controls></audio>
        </div>
        <div class="mb-6"></div>

        <!-- Gacha System -->
        <div class="glass p-6 mb-6 overflow-hidden">
            <div class="font-bold text-sm uppercase mb-2"><i class="fas fa-dice-d6 text-cyan-400"></i> Gacha System (Anime)</div>
            <div class="code-box" id="gacha-path">GET /api/tools/gacha/pull?apiKey=</div>
            <div class="flex gap-3 mb-3">
                <button class="btn-test" onclick="testGacha('pull')"><i class="fas fa-hand-fist"></i> 1 Pull</button>
                <button class="btn-test" onclick="testGacha('multipull')"><i class="fas fa-layer-group"></i> 10 Pulls</button>
            </div>
            <div class="grid grid-cols-2 gap-3 mb-3">
                <button class="btn-test bg-white/10 hover:bg-white/20" onclick="testGacha('characters')"><i class="fas fa-users"></i> Ver Personajes</button>
                <button class="btn-test bg-white/10 hover:bg-white/20" onclick="testGacha('stats')"><i class="fas fa-chart-line"></i> Estadísticas</button>
            </div>
            <input id="search-character" class="input-test" placeholder="Buscar personaje...">
            <button class="btn-test bg-white/5" onclick="testGacha('search')"><i class="fas fa-search"></i> Buscar</button>
            <div id="result-gacha" class="result-box"></div>
        </div>
        <button id="copy-gacha" class="btn-copy-json mb-6" onclick="copyResult('gacha')"><i class="fas fa-copy mr-2"></i> COPIAR JSON</button>

    </main>

    <script>
        const userData = JSON.parse(localStorage.getItem('kazuma_user'));
        if (!userData) { window.location.href = '/login'; }
        else {
            document.addEventListener("DOMContentLoaded", () => {
                document.getElementById('ss-path').innerText += `${userData.key}&url=...&device=...&theme=...`;
                document.getElementById('qr-path').innerText += `${userData.key}&text=...`;
                document.getElementById('tts-path').innerText += `${userData.key}&texto=...&genero=mujer`;
                document.getElementById('gacha-path').innerText = `GET /api/tools/gacha/pull?apiKey=${userData.key}`;
                setTimeout(() => document.getElementById('safety-block').style.display='none', 300);
            });
        }

        let generoTTS = 'mujer';

        function setGenero(g) {
            generoTTS = g;
            document.getElementById('btn-mujer').classList.toggle('active', g === 'mujer');
            document.getElementById('btn-hombre').classList.toggle('active', g === 'hombre');
        }

        async function testTTS() {
            const texto = document.getElementById('texto-tts').value.trim();
            const audio = document.getElementById('audio-tts');

            if (!texto) return Swal.fire({ icon: 'warning', title: 'Escribe algo', background: '#11111d', color: '#fff' });

            Swal.fire({ title: 'Generando voz...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            try {
                const url = `/api/tools/tts?texto=${encodeURIComponent(texto)}&genero=${generoTTS}&apiKey=${userData.key}`;
                const response = await fetch(url);
                const data = await response.json();

                if (!data.status) throw new Error(data.error || 'Error del servidor');

                audio.src = data.url;
                audio.style.display = 'block';
                Swal.close();
                audio.play();
            } catch (e) {
                Swal.close();
                Swal.fire({ icon: 'error', title: 'Error', text: e.message, background: '#11111d', color: '#fff' });
            }
        }

        async function testMedia(type) {
            const imgEl = document.getElementById(`view-${type}`);
            let finalUrl = "";
            if(type === 'ssweb') {
                const u = document.getElementById('url-ss').value;
                const d = document.getElementById('device-ss').value;
                const t = document.getElementById('theme-ss').value;
                if(!u) return;
                finalUrl = `/api/tools/ssweb?url=${encodeURIComponent(u)}&device=${d}&theme=${t}&apiKey=${userData.key}`;
            } else {
                const txt = document.getElementById('text-qr').value;
                if(!txt) return;
                finalUrl = `/api/tools/qr?text=${encodeURIComponent(txt)}&apiKey=${userData.key}`;
            }
            Swal.fire({ title: 'Procesando...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            imgEl.src = finalUrl;
            imgEl.onload = () => { imgEl.style.display = 'block'; Swal.close(); };
        }

        async function testGacha(action) {
            const resBox = document.getElementById('result-gacha');
            const copyBtn = document.getElementById('copy-gacha');
            let url = '';
            switch(action) {
                case 'pull': url = `/api/tools/gacha/pull?apiKey=${userData.key}`; break;
                case 'multipull': url = `/api/tools/gacha/multipull?apiKey=${userData.key}`; break;
                case 'characters': url = `/api/tools/gacha/characters?apiKey=${userData.key}`; break;
                case 'stats': url = `/api/tools/gacha/stats?apiKey=${userData.key}`; break;
                case 'search':
                    const search = document.getElementById('search-character').value.trim();
                    if(!search) return Swal.fire({ icon: 'warning', title: 'Escribe un nombre', background: '#11111d', color: '#fff' });
                    url = `/api/tools/gacha/characters?search=${encodeURIComponent(search)}&apiKey=${userData.key}`;
                    break;
            }
            resBox.style.display = 'block';
            resBox.innerText = "CARGANDO...";
            copyBtn.style.display = 'none';
            try {
                const response = await fetch(url);
                const data = await response.json();
                resBox.innerText = JSON.stringify(data, null, 2);
                copyBtn.style.display = 'block';
            } catch (error) {
                resBox.innerText = "ERROR AL CARGAR";
                copyBtn.style.display = 'block';
            }
        }

        function copyResult(id) {
            const text = document.getElementById(`result-${id}`).innerText;
            navigator.clipboard.writeText(text);
            Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Copiado', showConfirmButton: false, timer: 1000, background: '#11111d', color: '#fff' });
        }

        window.onload = () => { 
            grecaptcha.ready(() => { 
                grecaptcha.execute('6Lfw-dwsAAAAACc6y5K4sfFnplSqbskYPia1ADh5', {action: 'tools_test'}); 
            });
        };
    </script>
</body>
</html>
